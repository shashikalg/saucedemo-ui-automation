name: UI Automation Tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up .NET 6
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '6.0.x'

      - name: Restore dependencies
        run: dotnet restore SauceDemoUIAutomation.sln

      - name: Build solution
        run: dotnet build SauceDemoUIAutomation.sln --configuration Release --no-restore

      - name: Run UI tests
        run: dotnet test SauceDemoUIAutomation.sln --configuration Release --no-build --logger "trx;LogFileName=test-results.trx"

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: |
            **/*.trx
            **/TestResults/**